name: Deploy Cloudflare Workers

on:
  workflow_run:
    workflows: ['Release']
    types:
      - completed

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Workers
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@4.14.4

      - name: Deploy Auth Worker
        working-directory: apps/auth
        run: wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Signaling Worker
        working-directory: apps/signaling
        run: wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
